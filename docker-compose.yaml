
services:
  db:
    image: postgres:15
    container_name: franchise_db
    environment:
      POSTGRES_DB: franchise
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: franchise_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/franchise
      SPRING_R2DBC_USERNAME: admin
      SPRING_R2DBC_PASSWORD: admin
